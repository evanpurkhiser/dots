name: build
on: [push, pull_request, create]

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          cache: false
          install: true

      - name: Checkout tags
        run: |
          git fetch --prune --unshallow
          git fetch origin +refs/tags/*:refs/tags/*

      - name: Lint
        run: prek run --all-files

      - name: Test
        run: go test ./...

      - name: Build
        run: |
          GOARCH=amd64 GOOS=windows make && mv dist/dots{,-windows-amd64.exe}
          GOARCH=amd64 GOOS=darwin  make && mv dist/dots{,-macos-amd64}
          GOARCH=arm64 GOOS=darwin  make && mv dist/dots{,-macos-arm64}
          GOARCH=amd64 GOOS=linux   make && mv dist/dots{,-linux-amd64}
          GOARCH=arm64 GOOS=linux   make && mv dist/dots{,-linux-aarch64}

      - name: Release latest master
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@fe965f7af51af5f2602596916f38a38df2e33de0 # v3.0.2
        with:
          tag_name: dev-build
          target_commitish: ${{ github.sha }}
          prerelease: true
          name: Development Build
          make_latest: false
          files: |
            scripts/bootstrap
            dist/dots-linux-amd64
            dist/dots-linux-aarch64
            dist/dots-macos-amd64
            dist/dots-macos-arm64
            dist/dots-windows-amd64.exe

      - name: Release tagged version
        if: github.event_name == 'create' && startsWith(github.ref, 'refs/tags')
        uses: softprops/action-gh-release@fe965f7af51af5f2602596916f38a38df2e33de0 # v3.0.2
        with:
          prerelease: false
          files: |
            scripts/bootstrap
            dist/dots-linux-amd64
            dist/dots-linux-aarch64
            dist/dots-macos-amd64
            dist/dots-macos-arm64
            dist/dots-windows-amd64.exe
